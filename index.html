<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hazel ❤️</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff5f8f,#ff8fb1);
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    .card{
      text-align:center;
      background:white;
      padding:50px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      width:350px;
    }

    h1{
      color:#ff2f6d;
      margin-bottom:10px;
      font-size:40px;
    }

    p{
      font-size:24px;
      margin-bottom:35px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:20px;
      position:relative;
      height:60px;
    }

    button{
      border:none;
      padding:15px 28px;
      border-radius:14px;
      font-size:18px;
      cursor:pointer;
      transition:0.2s;
      position:relative;
    }

    #yesBtn{
      background:#4CAF50;
      color:white;
    }

    #noBtn{
      background:#ff3b3b;
      color:white;
    }

    #message{
      margin-top:30px;
      font-size:28px;
      color:#ff2f6d;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hazel ❤️</h1>
    <p>Kararın ne?</p>

    <div class="buttons">
      <button id="yesBtn">Olur 😍</button>
      <button id="noBtn">Olmaz 😅</button>
    </div>

    <div id="message"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    let noCount = 0;

    noBtn.addEventListener("click", () => {
      noCount++;

      message.innerHTML = "Nasıl olmaz yaa 😭";

      const x = Math.random() * 200 - 100;
      const y = Math.random() * 100 - 50;

      noBtn.style.transform = `translate(${x}px, ${y}px)`;

      if(noCount >= 2){
        noBtn.style.display = "none";
      }
    });

    yesBtn.addEventListener("click", () => {
      message.innerHTML = "Biliyordum 😎❤️";
    });
  </script>

</body>
</html>
